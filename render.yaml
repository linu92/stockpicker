services:
  - type: web
    name: stockpicker-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    region: singapore
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: DATABASE_URL
        sync: false

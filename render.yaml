databases:
  - name: stockpicker-db
    databaseName: stockpicker
    user: stockuser
    plan: free
    region: singapore

services:
  - type: web
    name: stockpicker-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockpicker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.0"
